name: Build and Release

on:
  push:
    tags:
      - 'v*'   # triggers when you push a tag like v1.0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build all platforms
        run: |
          GOOS=windows GOARCH=amd64 go build -o dist/brainrot.exe main.go
          GOOS=linux   GOARCH=amd64 go build -o dist/brainrot-linux main.go
          GOOS=darwin  GOARCH=amd64 go build -o dist/brainrot-mac main.go
          GOOS=darwin  GOARCH=arm64 go build -o dist/brainrot-mac-arm main.go

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*